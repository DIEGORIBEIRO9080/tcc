<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Sistema</title>

        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">

        <style>
            /* =================== GLOBAL =================== */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Mona Sans', sans-serif;
                color: #AEB9E1;
            }

            body {
                display: grid;
                grid-template-columns: 200px 1fr; 
                height: 100vh;
                background-color: #081028;
                
            }

            /* =================== SIDEBAR =================== */
            .sidebar {
                grid-column: 1;
                background-color: #0A1229;
                border-right: 1px solid #e0dddd;
            }
            /* Logo do IFCE na sidebar */
            .logo-ifce {
                width: 140px;      /* ajuste como quiser: 80px, 100px, 120px... */
                height: auto;
                display: block;
                margin: 20px auto; /* centraliza horizontalmente */
                
                filter: brightness(0) invert(1);
            }

            /* =================== CONTEÚDO =================== */
            .content {
                grid-column: 2;
                display: grid;
                grid-template-rows: auto 1fr auto;
                gap: 10px;
                padding: 10px;
                align-items: start;
            }

            /* =================== HEADER =================== */
            .header {
                text-align: left;
                padding-left: 50px;
                font-size: 1rem;
                font-weight: 200;
                
            }

            /* =================== TÍTULO TABELA =================== */
            .headerTable {
                display: flex;
                background-color: #0B1739;
                text-align: left;

                margin: 0 auto;
                width: 95%;

                border: 0.1px solid  rgb(223, 215, 215);
                border-collapse: collapse;
                padding: 2px 0;
                padding-left: 110px;

                font-weight: bold;
            }

            /* =================== TABELA =================== */
            .table {
                width: 95%;
                margin: 0 auto;
                border: 0.1px solid rgb(223, 215, 215);
                border-collapse: collapse;
                table-layout: fixed;
                background-color: #0B1739;
            }

            /* Cabeçalho da tabela */
            .table thead th {
                padding: 0 5px;
                text-align: left;
                vertical-align: middle;
                height: 56px; /* +3px */
                border-bottom: 0.1px solid rgb(223, 215, 215);
                overflow: hidden;
                white-space: nowrap;
                text-overflow: ellipsis;
            }

            /* Linhas da tabela */
            .table tbody tr {
                height: 66px; /* +3px */
                border-bottom: 0.1px solid rgba(223, 218, 215, 1);
            }

            /* Células da tabela */
            .table tbody td {
                padding: 0;            
                vertical-align: middle;
                overflow: hidden;
                text-align: center;
            }

            /* Coluna de imagem */
            .img-col {
                width: 50px;
                height: 66px;  /* +3px */
            }

            /* Linhas vazias */
            .table tbody tr.empty-row td {
                height: 66px;  /* +3px */
                border: none;
                background: transparent;
            }

            /* Hover na linha */
            .table tbody tr:hover {
                background-color: rgba(255, 255, 255, 0.1);
            }

            /* Paginação */
            .pagination {
                margin-left: 55px;  /* +5px */
            }

            /* ------------------rodapé ------------------ */
            .footer {
            width: 100%;
            height: 40px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            border-top: 1px solid rgba(215, 223, 215, 1);
            padding: 0 16px;
            align-self: end;
            }

            .By {
                text-align: left;
                padding-left: 50px;
            }

            .powered {
                text-align: right;
                padding-right: 50px;
            }

            .icone-notificacao{
                font-size: 25px;
                position: absolute;
                right: 20px;
                padding-top: 12px;
                padding-right: 150px;
            }
            .titleTable {
                margin: 0;
                font-size: 1.4rem;
                font-weight: 600;
                padding-left: 50px;
            }

            .btn {
                padding: 15px 20px;
                border-radius: 8px;
                font-size: 0.95rem;
                font-weight: 500;
                text-decoration: none;
                color: #fff;
                background: linear-gradient(135deg, #478EEB, #0B1739);
                transition: transform 0.2s ease, box-shadow 0.2s ease;
                
            }

            .btn:hover {
                transform: translateY(-1px);
                box-shadow: 0 6px 14px rgba(0,0,0,0.2);
            }
            .headerTable {
                display: flex;
                align-items: center;
                justify-content: space-between; /* empurra o botão pra direita */
                padding: 12px;
                padding-right: 50px;
            }










            .header {
                position: relative;
                display: flex;
                
                justify-content: left;
               
                
            }

            /* TÍTULO */
            .header .title {
                font-size: 22px;
                font-weight: bold;
                
                padding-left: 80px;
            }

            /* ÁREA DA NOTIFICAÇÃO */
            .notificacao-area {
                position: absolute;
                right: 120px; /* 👈 exatamente o que você pediu */
            }

            /* BOTÃO DO SINO */
            .btn-notificacao {
                background: none;
                border: none;
                cursor: pointer;
                position: relative;
                font-size: 22px;
                
            }

            /* BADGE */
            .btn-notificacao .badge {
                position: absolute;
                top: -6px;
                right: -8px;
                background-color: red;
                color: #fff;
                font-size: 11px;
                padding: 3px 6px;
                border-radius: 50%;
                display: none;
            }





            /* ==============================
            MODAL DE NOTIFICAÇÕES
            ============================== */
            .modal-notificacao {
                display: none;
                position: fixed;
                z-index: 1000;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                overflow: auto;
                background-color: rgba(0,0,0,0.4); /* fundo escuro semi-transparente */
                font-family: Arial, sans-serif;
            }

            /* Conteúdo do modal */
            .modal-conteudo {
                background-color: #0B1739; /* fundo fora da tabela */
                margin: 5% auto;
                padding: 20px;
                border-radius: 10px;
                width: 95%;
                max-width: 550px;
                color: #fff;
                box-shadow: 0 4px 10px rgba(0,0,0,0.2);
                display: flex;
                flex-direction: column;
                max-height: 300px; /* altura máxima do modal */
            }

            /* Cabeçalho do modal */
            .modal-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 10px;
            }

            .modal-header h5 {
                margin: 0;
                font-size: 20px;
                font-weight: bold;
                color: #fff; /* título branco */
                text-align: left;
            }

            #fecharModal {
                cursor: pointer;
                font-size: 24px;
                font-weight: bold;
                color: #fff;
                transition: color 0.2s;
            }

            #fecharModal:hover {
                color: #ff0000;
            }

            /* Corpo do modal */
            .modal-body {
                width: 100%;
                max-height: 300px; /* altura máxima da tabela */
                overflow-y: auto; /* scroll aparece se passar de 7 linhas */
            }

            /* ==============================
            Tabela dentro do modal
            ============================== */
            .modal-body .table {
                width: 100%;
                border-collapse: collapse;
                table-layout: fixed;
                text-align: center;
                color: #0B1739; /* fonte azul escura */
                
            }

            /* Cabeçalho da tabela */
            .modal-body thead {
                background-color: #fff;
            }

            .modal-body thead tr {
                border-bottom: 3px solid #0B1739; /* linha azul abaixo do cabeçalho */
            }

            .modal-body th {
                font-weight: bold;
                padding: 8px;
                color: #0B1739;
                text-align: center;
                background-color: #fff;
            }

            /* Linhas do corpo da tabela */
            .modal-body td {
                background-color: #fff; /* fundo branco */
                color: #0B1739; /* fonte azul escura */
                text-align: center;
                padding: 8px;
                
                border-bottom: 1px solid #0B1739; /* apenas linhas horizontais */
            }

            /* Remove bordas verticais */
            .modal-body th, .modal-body td {
                border-left: none;
                border-right: none;
            }

            /* Linha de "nenhuma notificação" */
            .modal-body .text-center {
                padding: 20px 0;
                font-style: italic;
                color: #0B1739;
            }

            /* Altura das linhas da tabela */
            .modal-body table tbody tr {
                height: 48px;
            }
            /* Centraliza o texto de todas as células da tabela */
            .modal-body table th,
            .modal-body table td {
                text-align: center !important;
                vertical-align: middle; /* opcional: centraliza também na vertical */
                
            }

             
   
            .messages {
                width: 95%;
                max-width: 1100px;
                margin: 15px auto;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .messages .alert {
                padding: 14px 18px;
                border-radius: 10px;
                font-weight: bold;
                font-size: 14px;
                text-align: center;
                box-shadow: 0px 4px 12px rgba(0,0,0,0.25);
                border: 1px solid rgba(255,255,255,0.15);
            }

            /* Sucesso */
            .messages .success {
                background-color: rgba(46, 204, 113, 0.25);
                border: 1px solid rgba(46, 204, 113, 0.6);
                color: #2ecc71;
            }

            /* Erro */
            .messages .error {
                background-color: rgba(231, 76, 60, 0.25);
                border: 1px solid rgba(231, 76, 60, 0.6);
                color: #e74c3c;
            }

            /* Aviso */
            .messages .warning {
                background-color: rgba(241, 196, 15, 0.25);
                border: 1px solid rgba(241, 196, 15, 0.6);
                color: #f1c40f;
            }

            /* Info */
            .messages .info {
                background-color: rgba(52, 152, 219, 0.25);
                border: 1px solid rgba(52, 152, 219, 0.6);
                color: #3498db;
            }
            














            /* ===============================
            SIDEBAR
            =============================== */
            .sidebar {
                background-color: #0B1739;
                color: white;
                width: 220px;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 20px 0;
                box-shadow: 2px 0 10px rgba(0,0,0,0.4);
                position: fixed;
                top: 0;
                left: 0;
            }

            /* logo */
            .logo-ifce {
                width: 150px;
                margin: 20px 0; /* espaço acima e abaixo da logo */
                position: relative;
            }

            /* linhas acima e abaixo da logo */
            .logo-ifce::before,
            .logo-ifce::after {
                content: "";
                display: block;
                height: 1px;
                background-color: #ffffff; /* mesma cor do texto */
                width: 100%; 
                margin: 10px 0; /* distância da logo */
            }

            /* lista de links */
            .sidebar ul {
                list-style: none;
                padding: 0;
                width: 100%;
            }

            .sidebar ul li {
                width: 100%;
                margin-bottom: 10px;
            }

            .sidebar ul li a {
                display: flex;
                align-items: center;
                padding: 12px 20px;
                color: white;
                text-decoration: none;
                font-weight: 500;
                border-radius: 8px;
                transition: 0.2s;
            }

            .sidebar ul li a:hover {
                background-color: #1b2560;
                padding-left: 25px;
            }

            /* separadores normais abaixo dos links */
            .sidebar hr {
                width: 80%;
                border: 0.5px solid rgba(255,255,255,0.2);
                margin: 20px auto;
            }




            




        </style>
