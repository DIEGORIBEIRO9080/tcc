<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Colaboradores</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">

        <style>
            /* =================== GLOBAL =================== */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Mona Sans', sans-serif;
                color: #AEB9E1;
            }

            body {
                display: grid;
                grid-template-columns: 200px 1fr; 
                height: 100vh;
                background-color: #081028;
            }

            /* =================== SIDEBAR =================== */
            .sidebar {
                grid-column: 1;
                background-color: #0A1229;
                border-right: 1px solid #e0dddd;
            }
            /* Logo do IFCE na sidebar */
            .logo-ifce {
                width: 140px;      /* ajuste como quiser: 80px, 100px, 120px... */
                height: auto;
                display: block;
                margin: 20px auto; /* centraliza horizontalmente */
                
                filter: brightness(0) invert(1);
            }

            /* =================== CONTEÚDO =================== */
            .content {
                grid-column: 2;
                display: grid;
                grid-template-rows: auto 1fr auto;
                gap: 10px;
                padding: 10px;
                align-items: start;
            }

            /* =================== HEADER =================== */
            .header {
                text-align: left;
                padding-left: 50px;
                font-size: 1rem;
                font-weight: 200;
                
            }

            /* =================== TÍTULO TABELA =================== */
            .headerTable {
                display: flex;
                background-color: #0B1739;
                text-align: left;

                margin: 0 auto;
                width: 95%;

                border: 0.1px solid  rgb(223, 215, 215);
                border-collapse: collapse;
                padding: 2px 0;
                padding-left: 110px;

                font-weight: bold;
            }

            /* =================== TABELA =================== */
            .table {
                width: 95%;
                margin: 0 auto;
                border: 0.1px solid rgb(223, 215, 215);
                border-collapse: collapse;
                table-layout: fixed;
                background-color: #0B1739;
            }

            /* Cabeçalho da tabela */
            .table thead th {
                padding: 0 5px;
                text-align: left;
                vertical-align: middle;
                height: 56px; /* +3px */
                border-bottom: 0.1px solid rgb(223, 215, 215);
                overflow: hidden;
                white-space: nowrap;
                text-overflow: ellipsis;
            }

            /* Linhas da tabela */
            .table tbody tr {
                height: 66px; /* +3px */
                border-bottom: 0.1px solid rgba(223, 218, 215, 1);
            }

            /* Células da tabela */
            .table tbody td {
                padding: 0;            
                vertical-align: middle;
                overflow: hidden;
                text-align: center;
            }

            /* Coluna de imagem */
            .img-col {
                width: 50px;
                height: 66px;  /* +3px */
            }

            /* Linhas vazias */
            .table tbody tr.empty-row td {
                height: 66px;  /* +3px */
                border: none;
                background: transparent;
            }

            /* Hover na linha */
            .table tbody tr:hover {
                background-color: rgba(255, 255, 255, 0.1);
            }

            /* Paginação */
            .pagination {
                margin-left: 55px;  /* +5px */
            }

            /* ------------------rodapé ------------------ */
            .footer {
            width: 100%;
            height: 40px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            border-top: 1px solid rgba(215, 223, 215, 1);
            padding: 0 16px;
            align-self: end;
            }

            .By {
                text-align: left;
                padding-left: 50px;
            }

            .powered {
                text-align: right;
                padding-right: 50px;
            }

            .icone-notificacao{
                font-size: 25px;
                position: absolute;
                right: 20px;
                padding-top: 12px;
                padding-right: 150px;
            }
            .titleTable {
                margin: 0;
                font-size: 1.4rem;
                font-weight: 600;
                padding-left: 50px;
            }

            .btn {
                padding: 15px 20px;
                border-radius: 8px;
                font-size: 0.95rem;
                font-weight: 500;
                text-decoration: none;
                color: #fff;
                background: linear-gradient(135deg, #478EEB, #0B1739);
                transition: transform 0.2s ease, box-shadow 0.2s ease;
                
            }

            .btn:hover {
                transform: translateY(-1px);
                box-shadow: 0 6px 14px rgba(0,0,0,0.2);
            }
            .headerTable {
                display: flex;
                align-items: center;
                justify-content: space-between; /* empurra o botão pra direita */
                padding: 12px;
                padding-right: 50px;
            }

        </style>
