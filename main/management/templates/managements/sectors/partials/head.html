{% include 'global/partials/head.html' %}
    <style>
        /* Imagem do setor*/
        .img-col img {
            width: 76px;   /* +3px */
            height: 56px;  /* +3px */
            object-fit: cover;
            display: block;
            margin: 0 auto;
            border-radius: 50%;
        }
        i{
            padding-left:10px;
        }
        .icone-ferias{
            color:rgb(53, 184, 44);
            
        }
        .desligado{
            color:red;
            padding-right: 8px;
        }

        /* Paginação */
        .pagination {
            margin-left: 55px;  /* +5px */
        }
        .filtros-container {
            padding-left: 80px;
            display: flex;
            gap: 15px;
        }

        .filtro-btn {
            background: none;
            border: none;
            cursor: default;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filtro-btn span {
            color: #ffffff;
            font-size: 14px;
        }

        .icon {
            stroke: #ffffff;
            fill: none;
        }

        .img-thumb {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Modal */
        .modal-img {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-img img {
            max-width: 90%;
            max-height: 100%;
            border-radius: 10px;
        }

        .modal-img .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
        }
        h3{
            text-align:center;
            color: #ffffff;
            padding-bottom:0;
        }














                /* Centralizar formulário na página */
        .setor-form {
            background-color: #0B1739;
            padding: 30px;
            border-radius: 12px;
            max-width: 700px;
            margin: 30px auto; /* CENTRALIZA */
        }

        /* Linhas com dois campos */
        .setor-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* Grupos */
        .setor-form .form-group {
            margin-bottom: 16px;
        }

        /* Labels */
        .setor-form label {
            display: block;
            margin-bottom: 6px;
            color: #ffffff;
            font-weight: 600;
            font-size: 14px;
        }

        /* Inputs */
        .setor-form input,
        .setor-form select,
        .setor-form textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        /* Foco */
        .setor-form input:focus,
        .setor-form select:focus,
        .setor-form textarea:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.35);
        }

        /* Botão */
        .setor-form .btn-salvar {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: #ffffff;
            color: #0B1739;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .setor-form .btn-salvar:hover {
            background-color: #121f4a;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .setor-form .form-row {
                grid-template-columns: 1fr;
            }
        }
        /* BOTÃO EXCLUIR (ICONE LIXEIRA) */
        .btn-icon.delete-btn {
            background: none !important;
            border: none !important;
            padding: 0 !important;
            margin: 0 !important;
            cursor: pointer;
            outline: none !important;
            box-shadow: none !important;
            text-decoration: none !important;

            /* aumenta +4px */
            font-size: 18px;
        }

        /* remove linha branca embaixo do ícone */
        .btn-icon.delete-btn i {
            text-decoration: none !important;
            border-bottom: none !important;
            display: inline-block;

            /* aumenta o tamanho real do ícone */
            font-size: 18px;
        }
        .edit{
            text-decoration: none !important;
        }

        

        /* tira qualquer estilo do form */
        .form-delete {
            display: inline-block;
            margin: 0;
            padding: 0;
            border: none;
        }
        .setor-form input,
        .setor-form select,
        .setor-form textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            color: #081028; /* <-- AQUI */
        }


        
    </style>
