    <tr>
        <td class="img-col">
            {% if setor.imagem %}
                <img 
                    src="{{ setor.imagem.url }}" 
                    alt="Foto de {{ setor.nome }}"
                    class="img-thumb"
                    onclick="abrirImagem('{{ setor.imagem.url }}')"
                >
            {% else %}
                <img 
                    src="/static/img/default-user.png" 
                    alt="Foto padrão"
                    class="img-thumb"
                    onclick="abrirImagem('/static/img/default-user.png')"
                >
            {% endif %}
        </td>

        <td>{{ setor.nome }}</td>
        <td>{{ setor.descricao }}</td>
        <td>{{ setor.dimensao }}</td>
        <td>{{ setor.natureza_piso }}</td>
        <td>{{ setor.area_envidracada }}</td>
        <td>{{ setor.mobilia }}</td>

        <td>
            {% if perms.management.change_setor %}
                <a href="{% url 'management:setor_edit' setor.id %}"
                title="Editar setor"
                class="btn-icon edit">
                    <i class="fa-solid fa-pencil"></i>
                </a>
            {% endif %}

            <i class="fa-solid fa-trash"></i>
        </td>
    </tr>
