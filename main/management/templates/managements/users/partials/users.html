<tr>
    <td>{{ user.username }}</td>
    <td>{{ user.email|default:"—" }}</td>

    <td>
        {% if user.is_superuser %}
            Administrador
        {% elif user.is_staff %}
            Staff
        {% else %}
            Usuário
        {% endif %}
    </td>

    <td>
        {% if user.is_active %}
            Ativo
        {% else %}
            Inativo
        {% endif %}
    </td>

    <td>
        <a href="#">Editar</a>
    </td>
</tr>
