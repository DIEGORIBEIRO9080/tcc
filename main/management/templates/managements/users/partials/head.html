{% include 'global/partials/head.html' %} 
<style>
    .headerTable {
        display: flex;
        align-items: center;
        justify-content: space-between; /* empurra o botão pra direita */
        padding: 12px;
        padding-right: 50px;
    }
    /* ==============================
    MENSAGENS DO DJANGO (ALERTS)
    ============================== */
    .messages {
        width: 95%;
        max-width: 1100px;
        margin: 15px auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .messages .alert {
        padding: 14px 18px;
        border-radius: 10px;
        font-weight: bold;
        font-size: 14px;
        text-align: center;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.15);
    }

    /* Sucesso */
    .messages .success {
        background-color: rgba(46, 204, 113, 0.25);
        border: 1px solid rgba(46, 204, 113, 0.6);
        color: #2ecc71;
    }

    /* Erro */
    .messages .error {
        background-color: rgba(231, 76, 60, 0.25);
        border: 1px solid rgba(231, 76, 60, 0.6);
        color: #e74c3c;
    }

    /* Aviso */
    .messages .warning {
        background-color: rgba(241, 196, 15, 0.25);
        border: 1px solid rgba(241, 196, 15, 0.6);
        color: #f1c40f;
    }

    /* Info */
    .messages .info {
        background-color: rgba(52, 152, 219, 0.25);
        border: 1px solid rgba(52, 152, 219, 0.6);
        color: #3498db;
    }
    /* ===========================
    BOTÃO EXCLUIR (SÓ ÍCONE)
    =========================== */
    .btn-icon.delete {
        background: transparent;
        border: none;
        padding: 0;
        margin: 0;
        cursor: pointer;
        font-size: 50px;;
        outline: none;
        box-shadow: none;
        padding-right: 10px;
        
        text-decoration: none; /* remove underline */
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    /* remove linha embaixo do <i> */
    .btn-icon.delete i {
        text-decoration: none;
        border: none;
        outline: none;

        font-size: 18px;
        
        transition: 0.2s ease;
    }

    /* hover */
    .btn-icon.delete:hover i {
       
        transform: scale(1.15);
    }

    /* remove qualquer linha se for link */
    .btn-icon.delete:visited,
    .btn-icon.delete:active,
    .btn-icon.delete:hover {
        text-decoration: none;
    }

    /* remove borda azul do focus */
    .btn-icon.delete:focus {
        outline: none;
        box-shadow: none;
    }
    .btn-icon {
        text-decoration: none !important;
        border: none !important;
        background: none !important;
        outline: none !important;
    }

    .btn-icon i {
        text-decoration: none !important;
        font-size: 24px;
    }
    .btn-icon.edit {
        margin-right: 15px; /* espaço entre os dois */
    }
    .btn-icon {
        background: none;
        border: none;
        padding: 0;
        margin: 0;
        cursor: pointer;
        text-decoration: none;
    }

    .btn-icon i {
        font-size: 24px; /* tamanho do ícone */
    }

    .btn-icon.edit {
        margin-right: 15px;
    }







</style>
