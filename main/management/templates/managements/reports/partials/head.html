{% include 'global/partials/head.html' %}
    <style>
        .dropdown {
            position: relative;
            width: 300px;
        }

        .dropdown-btn {
            width: 100%;
            padding: 8px;
            background: #f0f0f0;
            border: 1px solid #999;
            cursor: pointer;
            text-align: left;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background: #fff;
            border: 1px solid #999;
            width: 100%;
            max-height: 80px;     /* ← ALTURA FIXA */
            overflow-y: auto;     /* ← SCROLL */
            z-index: 10;
            padding: 5px;
        }

        .dropdown-content label {
            display: block;
            padding: 4px;
            cursor: pointer;
        }

        .dropdown-content label:hover {
            background: #eee;
        }

        /* abre o dropdown */
        .dropdown.open .dropdown-content {
            display: block;
        }
        .relatorios-container {
            display: flex;
            gap: 200px;
            background-color: #0B1739;
            padding: 110px;
            justify-content: center;
            align-items: center;
            border-radius: 20px; 
            margin: 0;
        }

        .relatorio-card {
            width: 400px;     /* ⬅️ MAIS LARGURA */
            height: 600px;    /* ⬅️ MAIS ALTURA */
            background: linear-gradient(135deg, #0B1739, #478EEB);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .relatorio-card i {
            font-size: 80px;  /* ⬅️ ÍCONE MAIOR */
            margin-bottom: 20px;
            color: #fff;
        }

        .relatorio-card span {
            font-size: 20px;
            font-weight: 600;
        }

        .relatorio-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 30px rgba(0, 0, 0, 0.35);
        }




    </style>
