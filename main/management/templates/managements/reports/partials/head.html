{% include 'global/partials/head.html' %}
    <style>
        .dropdown {
            position: relative;
            width: 300px;
        }

        .dropdown-btn {
            width: 100%;
            padding: 8px;
            background: #f0f0f0;
            border: 1px solid #999;
            cursor: pointer;
            text-align: left;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background: #fff;
            border: 1px solid #999;
            width: 100%;
            max-height: 80px;     /* ← ALTURA FIXA */
            overflow-y: auto;     /* ← SCROLL */
            z-index: 10;
            padding: 5px;
        }

        .dropdown-content label {
            display: block;
            padding: 4px;
            cursor: pointer;
        }

        .dropdown-content label:hover {
            background: #eee;
        }

        /* abre o dropdown */
        .dropdown.open .dropdown-content {
            display: block;
        }
        .relatorios-container {
            display: flex;
            gap: 200px;
            background-color: #0B1739;
            padding: 110px;
            justify-content: center;
            align-items: center;
            border-radius: 20px; 
            margin: 0;
        }

        .relatorio-card {
            width: 400px;     /* ⬅️ MAIS LARGURA */
            height: 600px;    /* ⬅️ MAIS ALTURA */
            background: linear-gradient(135deg, #0B1739, #478EEB);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .relatorio-card i {
            font-size: 80px;  /* ⬅️ ÍCONE MAIOR */
            margin-bottom: 20px;
            color: #fff;
        }

        .relatorio-card span {
            font-size: 20px;
            font-weight: 600;
        }

        .relatorio-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 30px rgba(0, 0, 0, 0.35);
        }


























                /* ==============================
        FORM RELATÓRIOS
        ============================== */

        .reports-form {
            background-color: #0B1739;
            padding: 35px;
            border-radius: 15px;
            max-width: 900px;
            margin: 30px auto;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.4);
        }

        /* Títulos */
        .reports-form h3 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 10px;
            margin-top: 20px;
            font-weight: bold;
        }

        /* Labels */
        .reports-form label {
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        /* Inputs e Select */
        .reports-form input,
        .reports-form select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 15px;
            background-color: #fff;
            margin-bottom: 15px;
        }

        /* Linha lado a lado */
        .reports-form .form-row {
            display: flex;
            gap: 20px;
        }

        .reports-form .form-row .form-group {
            flex: 1;
        }

        /* Botão gerar */
        .reports-form button {
            background-color: #00D4FF;
            color: #000;
            font-weight: bold;
            padding: 14px;
            border: none;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            transition: 0.3s;
        }

        .reports-form button:hover {
            background-color: #00a8cc;
            transform: scale(1.02);
        }

        /* ==============================
        DROPDOWN CHECKBOX
        ============================== */

        .reports-form .dropdown {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }

        .reports-form .dropdown-btn {
            background-color: #00D4FF;
            color: #000;
            font-weight: bold;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            user-select: none;
        }

        .reports-form .dropdown-btn:hover {
            background-color: #00a8cc;
        }

        /* Conteúdo do dropdown */
        .reports-form .dropdown-content {
            display: none;
            position: absolute;
            background-color: #fff;
            width: 100%;
            border-radius: 10px;
            padding: 10px;
            margin-top: 8px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.4);

            max-height: 180px;
            overflow-y: auto;
            z-index: 999;
        }

        /* Abrir dropdown */
        .reports-form .dropdown.open .dropdown-content {
            display: block;
        }

        /* Labels dentro do dropdown (arrumado igual o de tarefas) */
        .reports-form .dropdown-content label {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;

            padding: 8px 10px;
            border-radius: 8px;

            font-size: 14px;
            font-weight: normal;
            color: #000;
            cursor: pointer;

            transition: 0.2s;
        }

        .reports-form .dropdown-content label:hover {
            background-color: #e6f8ff;
        }

        /* Checkbox / Radio */
        .reports-form .dropdown-content input[type="checkbox"],
        .reports-form .dropdown-content input[type="radio"] {
            width: 16px;
            height: 16px;
            margin: 0;
            flex-shrink: 0;
            cursor: pointer;
        }

        /* ==============================
        RESPONSIVIDADE
        ============================== */
        @media (max-width: 768px) {
            .reports-form {
                padding: 20px;
            }

            .reports-form .form-row {
                flex-direction: column;
            }
        }

       .reports-form .export-row {
            display: flex;
            gap: 50px; /* ESPAÇO ENTRE OS BOTÕES */
            margin-top: 15px;

            justify-content: center; /* CENTRALIZA */
            align-items: center;
        }

        .reports-form .export-option {
            background: #fff;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;

            display: flex;
            align-items: center;
            gap: 12px;

            font-weight: bold;
            color: #000;

            transition: 0.2s;
            width: auto;
        }

        .reports-form .export-option:hover {
            background: #e6f8ff;
        }

        .reports-form .export-option input[type="radio"] {
            width: 18px;
            height: 18px;
            margin: 0;
        }





    </style>
