{% include 'global/partials/head.html' %}
    <style>
        .dropdown {
            position: relative;
            width: 300px;
        }

        .dropdown-btn {
            width: 100%;
            padding: 8px;
            background: #f0f0f0;
            border: 1px solid #999;
            cursor: pointer;
            text-align: left;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background: #fff;
            border: 1px solid #999;
            width: 100%;
            max-height: 80px;     /* ← ALTURA FIXA */
            overflow-y: auto;     /* ← SCROLL */
            z-index: 10;
            padding: 5px;
        }

        .dropdown-content label {
            display: block;
            padding: 4px;
            cursor: pointer;
        }

        .dropdown-content label:hover {
            background: #eee;
        }

        /* abre o dropdown */
        .dropdown.open .dropdown-content {
            display: block;
        }


    </style>
