{% include 'global/partials/head.html' %}

<style>
    body {
        background-color: #070f2b;
        font-family: Arial, sans-serif;
    }

    /* DASHBOARD GRID */
    .dashboard {
        display: grid;
        grid-template-rows: auto auto auto;
        gap: 25px;
        padding: 20px;
        width: 100%;
    }

    /* TOP – 4 quadrados */
    .top {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
    }

    /* SQUARES */
    .square {
        background-color: #0B1739;
        border-radius: 18px;
        height: 120px;
        padding: 20px;

        display: flex;
        flex-direction: column;
        justify-content: center;

        box-shadow: 0px 4px 12px rgba(0,0,0,0.4);
        transition: 0.2s;
        color: white;
    }

    .square:hover {
        transform: translateY(-5px);
    }

    /* MIDDLE */
    .middle {
        background-color: #0B1739;
        border-radius: 18px;
        padding: 20px;
        height: 350px;

        box-shadow: 0px 4px 12px rgba(0,0,0,0.4);
        color: white;
    }

    /* BOTTOM */
    .bottom {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    /* SMALL GRAPHS */
    .small-graph {
        background-color: #0B1739;
        border-radius: 18px;
        padding: 20px;
        height: 260px;

        box-shadow: 0px 4px 12px rgba(0,0,0,0.4);
        color: white;
    }

    /* RESPONSIVO */
    @media(max-width: 1200px) {
        .top {
            grid-template-columns: repeat(2, 1fr);
        }

        .bottom {
            grid-template-columns: 1fr;
        }
    }

    @media(max-width: 600px) {
        .top {
            grid-template-columns: 1fr;
        }
    }
    .square h2 {
        font-size: 32px;
        font-weight: bold;
        margin: 0;
        color: white;
    }

    .square p {
        margin-top: 8px;
        font-size: 14px;
        color: #9ca3af;
    }

    .graph-title {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 15px;
        color: #e5e7eb;
    }
    .middle {
        height: 350px;
        position: relative;
        padding: 20px;
    }

    .middle canvas {
        height: 280px !important; /* MENOR que a div */
        width: 100% !important;
    }

    .small-graph {
        height: 260px;
        position: relative;
        padding: 20px;
    }
    .small-graph canvas {
        height: 180px !important; /* um pouco menor que antes */
        width: 100% !important;
    }





    canvas {
        display: block;

        
    }
    .small-graph {
        height: 260px;
        position: relative;
        padding: 20px;
    }

    .small-graph canvas {
        height: 180px !important; /* diminui a altura para não ficar esticado */
        width: 100% !important;
    }

    .graph-title {
        font-size: 14px; /* menor */
        font-weight: bold;
        margin-bottom: 10px;
        color: #e5e7eb;
    }



    /* Ajuste dos quadrados com grid */
    .square {
        display: grid;
        grid-template-columns: 1fr auto; /* Texto à esquerda, ícone à direita */
        align-items: center;             /* Centraliza verticalmente */
        background-color: #0B1739;
        border-radius: 18px;
        height: 120px;
        padding: 20px;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.4);
        color: white;
        transition: 0.2s;
    }

    .square:hover {
        transform: translateY(-5px);
    }

    /* Texto do quadrado */
    .square-text {
        display: flex;
        flex-direction: column;      /* Número em cima, descrição embaixo */
        justify-content: center;
        gap: 5px;                    /* Espaço entre número e descrição */
    }

    /* Número grande */
    .square-text h2 {
        margin: 0;
        font-size: 32px;
        font-weight: bold;
        color: white;
    }

    /* Texto pequeno */
    .square-text p {
        margin: 0;
        font-size: 14px;
        color: #9ca3af;
    }

    /* Ícone do quadrado */
    .icone {
        font-size: 40px;              /* tamanho do ícone */
        color: #4f46e5;               /* cor do ícone */
        display: flex;
        justify-content: center;      /* horizontalmente */
        align-items: flex-start;      /* começa mais acima */
        margin-top: -10px;            /* levanta o ícone um pouco */
        width: 60px;
        height: 60px;
    }


    





</style>
