<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Sistema</title>

        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">

        <style>
            
            /* BODY: centraliza vertical e horizontalmente */
            body {
                background-color: #070f2b;
                font-family: Arial, sans-serif;
                height: 100vh; /* ocupa toda a altura da tela */
                display: flex;
                justify-content: center; /* horizontal */
                align-items: center;     /* vertical */
                margin: 0;               /* remove margem padrão */
                padding-bottom: 120px;
            }

            /* LOGIN WRAPPER */
            .login-wrapper {
                background-color: #0B1739;
                padding: 30px;
                border-radius: 12px;
                width: 600px;           
                box-shadow: 0 8px 20px rgba(0,0,0,0.3);
                color: #ffffff;
                transform: translateX(50px);  
                box-sizing: border-box;  /* garante que padding não aumente a largura */
            }

            /* Mensagens */
            .messages {
                margin-bottom: 20px;
            }

            .messages .alert {
                padding: 10px 12px;
                border-radius: 8px;
                margin-bottom: 10px;
                font-size: 14px;
            }

            .messages .alert.success {
                background-color: #00bfff33;
                color: #00bfff;
            }

            .messages .alert.error {
                background-color: #ff4c4c33;
                color: #ff4c4c;
            }

            /* Formulário */
            .login-form {
                display: flex;
                flex-direction: column;
            }

            /* Título */
            .login-form .form-title {
                text-align: center;
                margin-bottom: 25px;
                font-size: 24px;
                font-weight: bold;
            }

            /* Grupos de campos */
            .login-form .form-group {
                margin-bottom: 16px;
                width: 100%; /* força o grupo ocupar toda a largura */
            }

            /* Labels */
            .login-form label {
                display: block;
                margin-bottom: 6px;
                color: #ffffff;
                font-weight: 600;
                font-size: 14px;
                width: 100%; /* garante que o label acompanhe o input */
                box-sizing: border-box;
            }

            /* Inputs */
            .login-form input {
                width: 100%;
                padding: 10px 12px;
                border-radius: 8px;
                border: none;
                font-size: 14px;
                box-sizing: border-box; /* importante para alinhar largura */
            }

            /* Foco */
            .login-form input:focus {
                outline: none;
                box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.35);
            }

            /* Erros */
            .login-form .error {
                color: #ff4c4c;
                font-size: 13px;
                margin-top: 4px;
            }

            /* Botão de login */
            .login-form .btn-submit {
                width: 100%;
                margin-top: 20px;
                padding: 12px;
                background-color: #ffffff;
                color: #0B1739;
                border: none;
                border-radius: 8px;
                font-weight: bold;
                cursor: pointer;
                transition: 0.3s;
                box-sizing: border-box; /* garante largura igual ao input */
            }

            .login-form .btn-submit:hover {
                background-color: #121f4a;
                color: #ffffff;
            }




        </style>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />


        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">


        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    </head>
    <body>


        <div class="login-wrapper">

            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="alert {{ message.tags }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form action="{% url 'authors:login' %}" method="POST" class="login-form">
                {% csrf_token %}

                <h2 class="form-title">Login</h2>

                <div class="form-group">
                    <label>{{ form.username.label }}</label>
                    {{ form.username }}
                    {% for error in form.username.errors %}
                        <div class="error">{{ error }}</div>
                    {% endfor %}
                </div>

                <div class="form-group">
                    <label>{{ form.password.label }}</label>
                    {{ form.password }}
                    {% for error in form.password.errors %}
                        <div class="error">{{ error }}</div>
                    {% endfor %}
                </div>

                <button type="submit" class="btn-submit">Entrar</button>
            </form>

            
        </div>

            
    </body>
</html>
