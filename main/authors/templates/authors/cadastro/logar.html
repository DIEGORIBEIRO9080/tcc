{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sistema</title>

<style>

/* BODY */
body{
    background:#070f2b;
    font-family:Arial, sans-serif;
    height:100vh;
    margin:0;

    display:flex;
    justify-content:center;
    align-items:center;
    
}

/* CONTAINER */
.login-container{
    display:flex;
    flex-direction:column; /* força vertical */
    align-items:center;
    padding-bottom: 100px;
    
}

/* LOGO */
.logo-ifce{
    width:590px;
    background:white;
    padding:10px;
    border-top-left-radius: 12px;
    border-top-right-radius: 12px;
    
    height: 130px;
    border:1px solid white; /* linha branca */
}

/* BOX LOGIN */
.login-wrapper{
    background:#0B1739;
    padding:30px;
    border-bottom-left-radius: 12px;
    border-bottom-right-radius: 12px;
    width:550px;
    color:white;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    border:1px solid white; /* linha branca */
}

/* FORM */
.login-form{
    display:flex;
    flex-direction:column;
}

.form-group{
    margin-bottom:16px;
}

input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
}

.btn-submit{
    width:103%;
    padding:10px;   /* igual ao input */
    margin-top:20px;
    background:white;
    color:#0B1739;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    text-align: center;
    
}

</style>
</head>

<body>

<div class="login-container">

<img src="{% static 'img/ifce.png' %}" class="logo-ifce">

<div class="login-wrapper">

<form action="{% url 'authors:login' %}" method="POST" class="login-form">
{% csrf_token %}

<div class="form-group">
<label>{{ form.username.label }}</label>
{{ form.username }}
</div>

<div class="form-group">
<label>{{ form.password.label }}</label>
{{ form.password }}
</div>

<button class="btn-submit">Entrar</button>

</form>

</div>
</div>

</body>
</html>
